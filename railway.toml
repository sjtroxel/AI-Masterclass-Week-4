# Railway deployment configuration for ChronoQuizzr backend.
#
# Root Directory must be LEFT BLANK in the Railway UI (= repo root).
# Railpack isolates the Root Directory into the build container, so setting
# it to "server" makes ../shared/ inaccessible and tsc fails with TS2307.
# Running from the repo root gives the full file tree to the build.

[build]
# cd into server/ so tsc resolves tsconfig correctly.
# --include=dev forces devDependencies (TypeScript) to install even when
# Railway sets NODE_ENV=production — without this, tsc is missing and the
# compile step silently fails, leaving dist/ empty.
buildCommand = "cd server && npm ci --include=dev && npm run build"

[deploy]
# Run from repo root (/app); server/dist/index.js resolves to /app/server/dist/index.js.
startCommand = "node server/dist/index.js"
